[custom.vcs]
command = '''
if jj root >/dev/null 2>&1; then
  jj log -r @ --no-graph -T 'separate(" ", if(bookmarks, "Ôźė " ++ bookmarks.join(" "), "‚óá " ++ change_id.short(8)), if(!empty, "‚úĪ"))' 2>/dev/null
elif git rev-parse --git-dir >/dev/null 2>&1; then
  b=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null)
  [ -n "$(git status --porcelain 2>/dev/null)" ] && b="$b ‚úĪ"
  printf 'Ôźė %s' "$b"
fi
'''
when = 'git rev-parse --git-dir 2>/dev/null || jj root 2>/dev/null'
style = "bg:color_aqua"
format = '[[ $output ](fg:color_fg0 bg:color_aqua)]($style)'

